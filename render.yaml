services:
  - type: web
    name: emailagent-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_HOSTNAME
        sync: false
      - key: DATABASE_PORT
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: DATABASE_NAME
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: COMPOSIO_API_KEY
        sync: false
      - key: MODEL_NAME
        value: llama-3.3-70b-versatile
